name: Feature request
description: I want something added to datagrunt-studio
labels: ["feature request"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the workflow or pain point, not just the feature.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to see. Alternatives you've considered are welcome.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
    validations:
      required: false
